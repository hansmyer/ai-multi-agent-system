apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agent-system
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-agent-system
  template:
    metadata:
      labels:
        app: ai-agent-system
    spec:
      containers:
      - name: ai-agent-system
        image: ai-agent-system:latest
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: ai-agent-secrets
        env:
        - name: REDIS_HOST
          value: redis-service
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        healthCheck:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
